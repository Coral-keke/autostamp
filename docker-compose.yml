# ── Docker Compose ───────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/uploads:/app/backend/uploads
      - ./backend/output:/app/backend/output
    environment:
      - STAMP_HOST=0.0.0.0
      - STAMP_PORT=8000
    restart: unless-stopped

